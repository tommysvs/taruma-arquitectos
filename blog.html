<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="/assets/img/favicon.png">
    <title>Taruma Arquitectos - Blog/Noticias</title>
    <link rel="stylesheet" href="/styles/main.less">
</head>
<body>
    {{> header }}

    {{> hero }}

    {{> blog }}

    {{> footer }}

    <script type="module" src="/js/main.js"></script>

    <script type="module">
        function addComment(articleId) {
            const input = document.getElementById(`commentInput${articleId}`);
            const commentsDiv = document.getElementById(`comments${articleId}`);
            
            if (input.value.trim() !== "") {
                const newComment = document.createElement("div");
                newComment.classList.add("comment");
                newComment.innerText = input.value;
                commentsDiv.appendChild(newComment);
                input.value = "";
            }
        }

        window.addComment = addComment;
    </script>
</body>
</html>
